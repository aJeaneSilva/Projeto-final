<div class="login-container">
  <div class="login-card">
    
    <a href="/home" class="bot-voltar">←</a>
    <div class="logo-container">
      <img src="img/logob.png" alt="Logo NextStop Is" class="img">
      <h2 class="company-name">Cadastro NextStop Is</h2>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit($event)">
        <p>Digite seu nome:</p>
      <div class="input-group">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-fill input-icon" viewBox="0 0 16 16">
          <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
        </svg>
        <input type="text" name="nome" [(ngModel)]="nome" placeholder="Nome" required>
      </div>
      <p>Email:</p>
      <div class="input-group">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope-at-fill input-icon" viewBox="0 0 16 16">
      <path d="M2 2A2 2 0 0 0 .05 3.555L8 8.414l7.95-4.859A2 2 0 0 0 14 2zm10.314 6.252-1.948-1.192L14 4.887v4.254a5.5 5.5 0 0 0-1.686-.889zm2.496-4.144L8 8.99 1.19 4.887C1.244 4.86 1.3 4.843 1.357 4.832l6.233 3.8 6.233-3.8c.058.01.113.028.167.055zM0 5.687v5.132a2.5 2.5 0 0 0 2.5 2.5h3.332A6.5 6.5 0 0 1 5.034 11H2.5A1.5 1.5 0 0 1 1 9.5V5.687zm5.413 5.213L1 13.314V11.19l4.413-2.617a5.5 5.5 0 0 0 0 2.327z"/>
      <path d="M16 12.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0m-3.5-2a.5.5 0 1 0-1 0v1.5a.5.5 0 0 0 .223.416l1.25.833a.5.5 0 1 0 .554-.832L12.5 11.9z"/>
      </svg>
        <input type="email" name="email" [(ngModel)]="email" placeholder="Email" required>
      </div>
      <p>Crie uma senha:</p>
      <div class="input-group">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock-fill input-icon" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4m0 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3"/>
        </svg>
        <input type="password" name="senha" [(ngModel)]="senha" placeholder="Senha" required>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" required>
        <label for="terms">Li e concordo com os
          <a href="https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm" target="_blank">Termos e Condições.</a>
        </label>
      </div>

      <button type="submit" class="bot-login">Cadastrar e Entrar</button>
    </form>
  </div>
</div>
